services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusconnect_frontend
    ports:
      - "3000:80"  # Mapping host port 3000 to container port 80 (Nginx)
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - campusconnect_network
    environment:
      - VITE_API_URL=http://localhost:5000/api

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusconnect_backend
    ports:
      - "5000:5000"  # Mapping host port 5000 to container port 5000 (Node.js API)
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - campusconnect_network
    environment:
      # These environment variables override the local .env files
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/campusconnect
      - JWT_SECRET=your_jwt_secret_key_here

  # MongoDB Service
  mongodb:
    image: mongo:6.0
    container_name: campusconnect_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - campusconnect_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

# Define named volume for MongoDB persistence
volumes:
  mongodb_data:

# Define custom bridge network for service isolation
networks:
  campusconnect_network:
    driver: bridge
