services:
  frontend:
    # Pulls the pre-built React image directly from Docker Hub
    image: aarnav2/campusconnect-frontend:latest
    container_name: campusconnect_frontend_prod
    ports:
      - "80:80"  # Exposes the frontend directly to the public internet on port 80
    depends_on:
      - backend
    restart: always
    networks:
      - campusconnect_network

  backend:
    # Pulls the pre-built Node API image directly from Docker Hub
    image: aarnav2/campusconnect-backend:latest
    container_name: campusconnect_backend_prod
    ports:
      - "5000:5000" # Exposes the backend API
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - campusconnect_network
    environment:
      # These environment variables will be injected into the production container
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/campusconnect
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_production_key_here}

  mongodb:
    image: mongo:6.0
    container_name: campusconnect_mongodb_prod
    ports:
      - "27017:27017" # MongoDB port (Ensure AWS Security Group blocks this from the public!)
    volumes:
      - mongodb_data_prod:/data/db
    restart: always
    networks:
      - campusconnect_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongodb_data_prod:

networks:
  campusconnect_network:
    driver: bridge
